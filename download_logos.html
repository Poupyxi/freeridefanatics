async function svgToPngBlob(svgText) {
  const blob = new Blob([svgText], {type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const W = 400, H = img.naturalHeight ? Math.round(img.naturalHeight * 400 / (img.naturalWidth||400)) : 150;
      const c = document.createElement('canvas');
      c.width = W; c.height = Math.max(H,1);
      c.getContext('2d').drawImage(img, 0, 0, W, c.height);
      URL.revokeObjectURL(url);
      c.toBlob(b => b ? resolve(b) : reject('empty'), 'image/png');
    };
    img.onerror = e => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function log(msg, cls='') {
  const d = document.createElement('div');
  d.className = cls; d.innerHTML = msg;
  document.getElementById('log').appendChild(d);
  document.getElementById('log').scrollTop = 99999;
  return d;
}

async function run() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  document.getElementById('cmd').style.display = 'none';

  const entries = Object.entries(LOGOS);
  let ok=0, fail=0, i=0;
  const downloaded = [];

  for (const [key, file] of entries) {
    i++;
    document.getElementById('bar').style.width = (i/entries.length*100)+'%';
    document.getElementById('counter').textContent = `${i}/${entries.length}`;

    const row = log(`⬇️ ${key}…`);
    try {
      const r = await fetch(BASE + file);
      if (!r.ok) throw new Error('HTTP '+r.status);
      const text = await r.text();
      const isSvg = file.endsWith('.svg');
      let blob;
      if (isSvg) {
        blob = await svgToPngBlob(text);
      } else {
        blob = await r.blob();
      }
      triggerDownload(blob, key + '.png');
      downloaded.push(key + '.png');
      row.className = 'ok';
      row.innerHTML = `✅ ${key}.png`;
      ok++;
    } catch(e) {
      row.className = 'err';
      row.innerHTML = `❌ ${key} — ${e.message||e}`;
      fail++;
    }
    // Petite pause pour éviter le throttling navigateur
    await new Promise(r => setTimeout(r, 80));
  }

  document.getElementById('bar').style.width = '100%';
  document.getElementById('counter').textContent = `✅ ${ok} téléchargés, ❌ ${fail} échoués`;

  // Afficher la commande Terminal
  const cmd = `mv ~/Downloads/{${downloaded.join(',')}} ~/Desktop/freeride/logos/`;
  document.getElementById('cmdtext').textContent = cmd;
  document.getElementById('cmd').style.display = 'block';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '🔄 Relancer';
}

function copyCmd() {
  navigator.clipboard.writeText(document.getElementById('cmdtext').textContent);
  event.target.textContent = '✅ Copié !';
  setTimeout(() => event.target.textContent = '📋 Copier', 2000);
}
